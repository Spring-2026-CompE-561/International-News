openapi: 3.0.3
info:
  title: International News API
  version: '1.0'
  description: >
    REST API for International News - a web application that allows users to search for news articles
    based on region, country, and topic, and compare how different countries cover the same events.
servers:
  - url: http://localhost:8000
    description: Local FastAPI development server

tags:
  - name: Auth
  - name: Users
  - name: Topics
  - name: Articles
  - name: Countries
  - name: Sources
  - name: Regions
  - name: Bookmarks

paths:
  /signup:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email or username already exists

  /login:
    post:
      summary: Login and receive a JWT token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  userId:
                    type: integer

  /users/{id}:
    get:
      summary: Retrieve user profile
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

    put:
      summary: Update user profile
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

    delete:
      summary: Delete a user account
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /articles:
    get:
      summary: Search and retrieve news articles
      tags: [Articles]
      description: >
        Returns articles filtered by topic, region, country, keyword,
        or specific real-world event.
      parameters:

        - name: q
          in: query
          schema:
            type: string
          description: Keyword search
          example: climate summit

        - name: topic
          in: query
          schema:
            type: string
            enum: [world, politics, economy, conflict, tech]
          description: Filter by topic category

        - name: topic_event_id
          in: query
          schema:
            type: integer
          description: Filter articles by a specific TopicEvent

        - name: region_id
          in: query
          schema:
            type: integer
          description: Filter by region

        - name: country_code
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: Filter by country code (derived from source)
          example: US
          
        - name: skip
          in: query
          schema:
            type: integer
            default: 0

        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            
      responses:
        "200":
          description: List of articles matching filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 84
                  articles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      summary: Get a single article by ID
      tags: [Articles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found

  # /articles/compare:
  # REMOVED and replaced by /topics/{id}/coverage

  /sources:
    get:
      summary: List all news sources
      tags: [Sources]
      parameters:
        - name: region_id
          in: query
          schema:
            type: integer
          description: Filter by region
        - name: country_code
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: Filter by country
          example: UK
          #added country_code filter.
      responses:
        "200":
          description: List of news sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"

  /sources/{id}:
    get:
      summary: Get a specific news source
      tags: [Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "404":
          description: Source not found

  /regions:
    get:
      summary: List all geographic regions
      tags: [Regions]
      responses:
        "200":
          description: List of regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"


  # vvv NEW Horizon Home Page endpoints (Topic first + Country grouping) vvvv
  /trending/topics:
    get:
      summary: Global trending topics (Topic first Home Page)
      tags: [Topics]
      description: >
        Returns trending real-world topics/events (not individual articles).
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: topic
          in: query
          schema:
            type: string
            enum: [world, politics, economy, conflict, tech]
          description: Optional category filter (re-uses your existing topic enum)
      responses:
        "200":
          description: Trending global topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  topics:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopicEventCard"
                      #new schema for topic cards on the home page

  /topics/{id}:
    get:
      summary: Get a single topic/event by ID
      tags: [Topics]
      description: >
        Real world topic/event object used for comparison views.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic/event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicEvent"
        "404":
          description: Topic not found

  /topics/{id}/coverage:  # this replaces /articles/compare as the core feature.
    get:
      summary: Country-grouped coverage for a topic (Core Feature)
      tags: [Topics]
      description: >
        Returns articles about the same topic grouped by country.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: countries
          in: query
          required: false
          schema:
            type: string
          description: Optional comma-separated list of country codes
          example: "US,JP,UK"
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
          description: Articles per country bucket
      responses:
        "200":
          description: Articles grouped by country for comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicCoverageResponse"
        "404":
          description: Topic not found

  /countries:
    get:
      summary: List all available countries
      tags: [Countries]
      description: >
        Countries represent the nation of origin for sources and the primary grouping unit.
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"

  /countries/{code}/trending/topics:
    get:
      summary: Trending topics within a country (Country tabs)
      tags: [Countries]
      description: >
        Returns trending topics inside one country’s media ecosystem.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: JP
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: topic
          in: query
          schema:
            type: string
            enum: [world, politics, economy, conflict, tech]
          description: Optional category filter
      responses:
        "200":
          description: Country trending topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  country:
                    $ref: "#/components/schemas/Country"
                  total:
                    type: integer
                  topics:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopicEventCard"

  /topics:
    get:
      summary: List all topic categories
      tags: [Topics]
      responses:
        "200":
          description: List of topic categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /bookmarks:
    get:
      summary: Get the current user's bookmarked articles
      tags: [Bookmarks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of bookmarked articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bookmark"
        "401":
          description: Unauthorized

    post:
      summary: Bookmark an article (or topic)
      tags: [Bookmarks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                article_id:
                  type: integer
                  example: 42
                topic_event_id:
                  type: integer
                  example: 101
                  # allow bookmarking a TopicEvent
              oneOf:
                - required: [article_id]
                - required: [topic_event_id]
      responses:
        "201":
          description: Bookmark created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  bookmark:
                    $ref: "#/components/schemas/Bookmark"

  /bookmarks/{id}:
    delete:
      summary: Remove a bookmark
      tags: [Bookmarks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bookmark removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          description: Bookmark not found

components:
  schemas:
    User:
      type: object
      description: Registered user of the International News platform
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        created_at:
          type: string
          format: date-time
          example: "2026-02-17T12:00:00Z"

    Article:
      type: object
      description: A news article collected from an international source
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "World Leaders Meet to Discuss Climate Policy"
        summary:
          type: string
          example: "Leaders from 50 nations gathered in Geneva..."
        url:
          type: string
          format: uri
          example: "https://bbc.com/news/world-climate-summit"
        image_url:
          type: string
          format: uri
          example: "https://bbc.com/images/climate.jpg"
        published_at:
          type: string
          format: date-time
          example: "2026-02-15T08:30:00Z"
        source:
          $ref: "#/components/schemas/Source"
        topic:
          $ref: "#/components/schemas/Topic"
        region:
          $ref: "#/components/schemas/Region"
        country:
          $ref: "#/components/schemas/Country"
          # added country derived from source (main grouping unit).
        topic_event:
          $ref: "#/components/schemas/TopicEvent"
          # added real-world topic/event reference for topic-first model.

    Source:
      type: object
      description: A news outlet categorized by region and perspective as well as compare these articles and see the sources.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "BBC World"
        country:
          $ref: "#/components/schemas/Country"
        website_url:
          type: string
          format: uri
          example: "https://www.bbc.com/news/world"
        region:
          $ref: "#/components/schemas/Region"

    Region:
      type: object
      description: A geographic region grouping news sources
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Western Europe"
        description:
          type: string
          example: "News sources from Western European countries"


    Country:
      type: object
      description: Country of origin (primary grouping unit)
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 2
          example: US
        name:
          type: string
          example: United Kingdom

    Topic:
      type: object
      description: A topic category used to filter and organize articles
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Politics"
        slug:
          type: string
          example: "politics"

    TopicEventCard:
      type: object
      description: A trending real-world topic card (home feed)
      # new schema used by /trending/topics and country topic tabs.
      properties:
        id:
          type: integer
          example: 101
        title:
          type: string
          example: "Ukraine War Escalation"

        query:
          type: string
          example: "ukraine war escalation"
          #search can differ from title

        summary:
          type: string
          example: "Reports indicate intensified fighting and new diplomatic moves..."
        category:
          type: string
          enum: [world, politics, economy, conflict, tech]
          example: conflict

    TopicEvent:
      type: object
      description: A real-world event/subject clustered from multiple articles
      # new schema for topic-first model.
      properties:
        id:
          type: integer
          example: 101
        title:
          type: string
          example: "Ukraine War Escalation"

        query:
          type: string
          example: "ukraine war escalation"

        summary:
          type: string
          example: "Reports indicate intensified fighting and new diplomatic moves..."
        category:
          type: string
          enum: [world, politics, economy, conflict, tech]
          example: conflict

        created_at:
          type: string
          format: date-time
          example: "2026-02-26T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-02-26T19:30:00Z"

    TopicCoverageBucket:
      type: object
      # helper schema for /topics/{id}/coverage response
      properties:
        country:
          $ref: "#/components/schemas/Country"
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"

    TopicCoverageResponse:
      type: object
      # response schema for /topics/{id}/coverage
      properties:
        topic:
          $ref: "#/components/schemas/TopicEvent"
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/TopicCoverageBucket"

    Bookmark:
      type: object
      description: A saved article linked to a user
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        article:
          $ref: "#/components/schemas/Article"

        topic_event:
          $ref: "#/components/schemas/TopicEvent"
          # allow bookmarking a TopicEvent

        created_at:
          type: string
          format: date-time
          example: "2026-02-17T14:00:00Z"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT